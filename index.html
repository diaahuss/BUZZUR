<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BUZZUR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">Loading BUZZUR...</main>

  <!-- Buzz sound -->
  <audio id="buzz-sound" src="buzz.mp3" preload="auto"></audio>

  <!-- Socket.IO from Render backend -->
  <script src="https://buzzur-server.onrender.com/socket.io/socket.io.js"></script>
  <script>
    try {
      const socket = io("https://buzzur-server.onrender.com");
      window.socket = socket;
    } catch (e) {
      alert("Failed to connect to buzzur-server backend.");
      console.error(e);
    }
  </script>

  <script src="script.js"></script>
</body>
</html>
