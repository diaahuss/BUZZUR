<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BUZZUR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <!-- Content will be dynamically rendered here -->
  </main>

  <!-- Buzz sound -->
  <audio id="buzz-sound" src="buzz.mp3" preload="auto"></audio>

  <!-- Socket.IO from Render backend -->
  <script src="https://buzzur-server.onrender.com/socket.io/socket.io.js"></script>
  <script>
    const socket = io("https://buzzur-server.onrender.com");
    window.socket = socket;
  </script>

  <script src="script.js"></script>
</body>
</html>
